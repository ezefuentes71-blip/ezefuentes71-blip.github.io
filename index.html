    <script>
    // ¡IMPORTANTE! Pon AQUÍ tu URL real de Google Apps Script
    const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzzIbDaySlLjebdp8VLYYx1RhxFIQc25y82_TNgR7PiHDdmvkI5rNlZaatOHejVVmLn/exec';

    document.getElementById('reportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = this.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Enviando...';
        submitBtn.disabled = true;
        
        // Recopilar datos
        const formData = {
            reportante: document.getElementById('reportante').value,
            cuenta: document.getElementById('cuenta').value,
            date: document.getElementById('date').value,
            tipo: document.querySelector('input[name="tipo"]:checked').value,
            amount: document.getElementById('amount').value,
            description: document.getElementById('description').value,
            metodoPago: document.getElementById('metodoPago').value,
            timestamp: new Date().toLocaleString()
        };

        console.log('Enviando datos:', formData); // Para verificar

        try {
            // Usando JSONP como alternativa (más compatible)
            const callbackName = 'callback' + Date.now();
            
            // Crear un script dinámico
            const script = document.createElement('script');
            const url = new URL(GOOGLE_SHEETS_URL);
            url.searchParams.set('datos', JSON.stringify(formData));
            url.searchParams.set('callback', callbackName);
            
            // Promesa para manejar la respuesta
            const jsonpPromise = new Promise((resolve, reject) => {
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                
                script.onerror = function(error) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(error);
                };
                
                script.src = url.toString();
                document.body.appendChild(script);
                
                // Timeout por si acaso
                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        document.body.removeChild(script);
                        reject(new Error('Timeout'));
                    }
                }, 10000);
            });
            
            await jsonpPromise;
            
            // Mostrar éxito
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            successMsg.textContent = '✅ ¡Movimiento registrado con éxito!';
            
            // Limpiar formulario
            document.getElementById('reportForm').reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);

        } catch (error) {
            console.error('Error completo:', error);
            alert('Error al registrar: ' + error.message);
        } finally {
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
        }
    });
</script>
